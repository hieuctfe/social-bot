server {
    listen 80;
    server_name localhost;

    client_max_body_size 100m;

    # Proxy /uploads to nginx-uploads service
    location /uploads/ {
        proxy_pass http://nginx-uploads/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers for browser access
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Proxy /api to Postiz backend (port 3000) — strips the /api prefix
    location /api/ {
        proxy_pass http://postiz:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Postiz derives the auth cookie domain by extracting the "registered domain"
        # from FRONTEND_URL via tldts. For any hostname under a Public Suffix List (PSL)
        # entry — Tailscale (*.ts.net), Vercel (*.vercel.app), Railway, Render, etc. —
        # tldts returns the PSL entry itself (e.g. "ts.net") as the domain.
        # Browsers refuse to store cookies scoped to a PSL entry, so login flickers.
        #
        # Generic fix: rewrite every wildcard Domain=.* to the exact $host value.
        # This is correct for single-hostname deployments: the cookie should always
        # be scoped to the host the browser is actually talking to, regardless of
        # deployment URL. Works without config changes when the deployment URL changes.
        proxy_cookie_domain ~^\.(.+)$ $host;
    }

    # Proxy everything else to Postiz frontend
    location / {
        proxy_pass http://postiz:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
