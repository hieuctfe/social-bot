version: '3.9'

# Production compose — extend/override docker-compose.dev.yml
# Usage: docker compose -f docker-compose.dev.yml -f docker-compose.prod.yml up -d

networks:
  social-bot-net:
    driver: bridge

volumes:
  postgres-data:
  uploads-data:
  n8n-data:
  postiz-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - social-bot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - social-bot-net

  control-api:
    build:
      context: .
      dockerfile: infra/docker/control-api.Dockerfile
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads-data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social-bot-net

  dashboard-web:
    build:
      context: .
      dockerfile: infra/docker/dashboard-web.Dockerfile
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - social-bot-net

  ai-worker:
    build:
      context: .
      dockerfile: infra/docker/ai-worker.Dockerfile
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - social-bot-net

  n8n:
    image: n8nio/n8n:latest
    restart: always
    env_file: .env
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - social-bot-net

  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    env_file: .env
    volumes:
      - postiz-data:/uploads
    networks:
      - social-bot-net
